---
name: Tests

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

---
name: E2E Tests

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test_e2e:
    name: Kind E2E
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run e2e tests
        run: |
          go mod tidy
          make test-e2e

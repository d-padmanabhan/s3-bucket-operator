# This rule is not used by the project s3-bucket-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the aws.techfueled.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: s3-bucket-operator
    app.kubernetes.io/managed-by: kustomize
  name: s3bucket-editor-role
rules:
- apiGroups:
  - aws.techfueled.dev
  resources:
  - s3buckets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - aws.techfueled.dev
  resources:
  - s3buckets/status
  verbs:
  - get
